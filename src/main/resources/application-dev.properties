frontend.url=http://localhost:5173
# Database configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/school_portal_db
spring.datasource.username=admin
spring.datasource.password=admin
# Hibernate configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
# Ensure data.sql runs AFTER Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true
# Enable SQL script initialization
spring.sql.init.mode=never
# Security
spring.security.user.name=admin
spring.security.user.password=admin
# GitHub OAuth2 (from environment variables)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=TRACE
# AWS S3 configuration (Dummy values for dev)
aws.s3.bucket-name=my-bucket-name
bootstrap.admin.username=testadmin
bootstrap.admin.password=testpassword
bootstrap.admin.email=testadmin@example.com